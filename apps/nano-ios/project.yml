name: NanoMeters
options:
  bundleIdPrefix: com.willeasp.nanometers
  deploymentTarget: { iOS: "18.0" }   # native zoom transition (.navigationTransition(.zoom)) for the Now Playing morph
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only
    CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "NO"   # default off (test bundles have no Info.plist to sign); the app target overrides to YES below
targets:
  NanoMeters:
    type: application
    platform: iOS
    sources: [Sources, Resources]
    dependencies:
      - framework: ../../crates/nano-dsp/NanoDSP.xcframework
        embed: false        # static archive (libnano_dsp.a) — link, do not embed
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: NanoMeters
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIBackgroundModes: [audio]
        # Google Drive OAuth. These resolve from build settings at build time (Info.plist $(VAR)
        # substitution); the real values live in the gitignored Secrets.xcconfig (see Config.xcconfig /
        # Secrets.example.xcconfig). With no Secrets.xcconfig they're empty → Drive Connect stays disabled.
        GoogleOAuthClientID: "$(GOOGLE_OAUTH_CLIENT_ID)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "$(GOOGLE_OAUTH_REVERSED_SCHEME)"
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willeasp.nanometers.ios
        CODE_SIGN_STYLE: Automatic       # free personal team: Xcode provisions on the fly
        DEVELOPMENT_TEAM: 9GX3Z9282P     # William Asp (Personal Team)
        CODE_SIGN_ENTITLEMENTS: NanoMeters.entitlements   # keychain-access-groups → OAuth token storage
        # App signs "to run locally" on the Simulator (ad-hoc, credential-free) so the keychain
        # entitlement applies; the test bundles stay unsigned (project-level default), which avoids the
        # "no Info.plist to sign" failure and is fine — unit tests inherit the signed host's entitlements.
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  NanoMetersTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: NanoMeters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willeasp.nanometers.ios.tests
  NanoMetersUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: NanoMeters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willeasp.nanometers.ios.uitests
schemes:
  NanoMeters:
    build:
      targets: { NanoMeters: all, NanoMetersTests: [test], NanoMetersUITests: [test] }
    test:
      targets: [NanoMetersTests, NanoMetersUITests]
