name: NanoMeters
options:
  bundleIdPrefix: com.willeasp.nanometers
  deploymentTarget: { iOS: "18.0" }   # native zoom transition (.navigationTransition(.zoom)) for the Now Playing morph
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only
    CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "NO"   # headless sim builds/tests stay credential-free; device builds sign normally
targets:
  NanoMeters:
    type: application
    platform: iOS
    sources: [Sources, Resources]
    dependencies:
      - framework: ../../crates/nano-dsp/NanoDSP.xcframework
        embed: false        # static archive (libnano_dsp.a) — link, do not embed
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: NanoMeters
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIBackgroundModes: [audio]
        CADisableMinimumFrameDurationOnPhone: true   # allow the live meters to run >60 Hz (ProMotion 120 Hz)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willeasp.nanometers.ios
        CODE_SIGN_STYLE: Automatic       # free personal team: Xcode provisions on the fly
        DEVELOPMENT_TEAM: 9GX3Z9282P     # William Asp (Personal Team)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  NanoMetersTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: NanoMeters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willeasp.nanometers.ios.tests
  NanoMetersUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: NanoMeters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willeasp.nanometers.ios.uitests
schemes:
  NanoMeters:
    build:
      targets: { NanoMeters: all, NanoMetersTests: [test], NanoMetersUITests: [test] }
    test:
      targets: [NanoMetersTests, NanoMetersUITests]
